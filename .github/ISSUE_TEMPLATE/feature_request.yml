name: Feature request
description: Propose an enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed change.
    validations:
      required: true
  - type: textarea
    id: trust
    attributes:
      label: Trust and safety impact
      description: Describe permission/privacy/security implications.